apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Der konkrete Image-Tag wird von der CI via
#   kustomize edit set image ghcr.io/dorfentwicklungskreis-roessing/website=...:<git-sha>
# auf den gebauten Multi-Arch-Tag gesetzt und nach main committet.
images:
  - name: ghcr.io/dorfentwicklungskreis-roessing/website
    newName: ghcr.io/dorfentwicklungskreis-roessing/website
    newTag: latest
